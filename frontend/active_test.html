<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Active Test - Diploma Project</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/bss-overrides.css">
    <link rel="stylesheet" href="assets/css/Footer-Dark-icons.css">

    <style>
        /* Custom Styles for Test Interface */
        .sidebar-scroll {
            max-height: 75vh;
            overflow-y: auto;
            border-right: 1px solid #dee2e6;
        }

        /* Question Navigation Buttons */
        .q-nav-btn {
            width: 45px;
            height: 45px;
            margin: 4px;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid #ced4da;
            background-color: white;
            color: #495057;
        }

        .q-nav-btn:hover {
            background-color: #e9ecef;
        }

        .q-nav-btn.active-q {
            border: 2px solid #212529; /* Black border for current question */
        }

        /* ORT Color Logic */
        .status-blue {
            background-color: #0d6efd !important;
            color: white !important;
            border: none;
        }

        .status-green {
            background-color: #198754 !important;
            color: white !important;
            border: none;
        }

        #timer-display {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545; /* Red color */
        }

        /* Option Styling */
        .option-card {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #dee2e6;
        }
        .option-card:hover {
            background-color: #f8f9fa;
        }
        .option-input:checked + .option-label .option-card {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }

        /* Disable interaction if locked */
        .locked-options {
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md bg-dark py-3" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <span class="bs-icon-sm bs-icon-rounded bs-icon-primary d-flex justify-content-center align-items-center me-2 bs-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16" class="bi bi-bezier">
                        <path fill-rule="evenodd" d="M0 10.5A1.5 1.5 0 0 1 1.5 9h1A1.5 1.5 0 0 1 4 10.5v1A1.5 1.5 0 0 1 2.5 13h-1A1.5 1.5 0 0 1 0 11.5zm1.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zm10.5.5A1.5 1.5 0 0 1 13.5 9h1a1.5 1.5 0 0 1 1.5 1.5v1a1.5 1.5 0 0 1-1.5 1.5h-1a1.5 1.5 0 0 1-1.5-1.5zm1.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zM6 4.5A1.5 1.5 0 0 1 7.5 3h1A1.5 1.5 0 0 1 10 4.5v1A1.5 1.5 0 0 1 8.5 7h-1A1.5 1.5 0 0 1 6 5.5zM7.5 4a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5z"></path>
                        <path d="M6 4.5H1.866a1 1 0 1 0 0 1h2.668A6.517 6.517 0 0 0 1.814 9H2.5c.123 0 .244.015.358.043a5.517 5.517 0 0 1 3.185-3.185A1.503 1.503 0 0 1 6 5.5zm3.957 1.358A1.5 1.5 0 0 0 10 5.5v-1h4.134a1 1 0 1 1 0 1h-2.668a6.517 6.517 0 0 1 2.72 3.5H13.5c-.123 0-.243.015-.358.043a5.517 5.517 0 0 0-3.185-3.185z"></path>
                    </svg>
                </span>
                <span>Brand</span>
            </a>

            <div class="mx-auto text-white d-flex align-items-center">
                <span class="me-2">Time Remaining:</span>
                <span id="timer-display">00:00:00</span>
            </div>

            <button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-5">
                <span class="visually-hidden">Toggle navigation</span>
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navcol-5">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="testing.html">Back to Tests</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 mb-5">
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Questions</h5>
                    </div>
                    <div class="card-body sidebar-scroll">
                        <div class="d-flex flex-wrap justify-content-start" id="sidebar-container">
                            <div class="text-center w-100 mt-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-success w-100" onclick="finishTest()">Finish Test</button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card shadow-sm" style="min-height: 60vh;">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h4 class="mb-0" id="test-type-title">Test</h4>
                        <span class="badge bg-secondary">Question <span id="q-current">0</span> / <span id="q-total">0</span></span>
                    </div>

                    <div class="card-body p-4">
                        <div class="mb-5">
                            <h5 class="lh-base" id="question-text" style="font-size: 1.25rem;">
                                Loading question...
                            </h5>
                        </div>

                        <div id="options-container" class="row g-3">
                            </div>

                        <div id="locked-message" class="alert alert-warning mt-3" style="display: none;">
                            <small><i class="bi bi-lock-fill"></i> You have changed your answer once. This answer is now locked.</small>
                        </div>
                    </div>

                    <div class="card-footer bg-light d-flex justify-content-between py-3">
                        <button class="btn btn-outline-secondary px-4" id="btn-prev" onclick="changeQuestion(-1)">Previous</button>
                        <button class="btn btn-primary px-4" id="btn-next" onclick="changeQuestion(1)">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center bg-body" data-bs-theme="dark">
        <div class="container py-4 py-lg-5">
            <ul class="list-inline">

    <script src="assets/js/test-engine.js"></script>
</body>
</html>
