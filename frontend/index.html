<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>
    <h1>Products</h1>
    <ul id="products"></ul>

    <a href="http://localhost:8000/admin/" target="_blank">
    Go to Admin Panel
    </a>

    <script>
        fetch("http://localhost:8001/products")
            .then(res => res.json())
            .then(data => {
                const ul = document.getElementById("products");
                data.forEach(p => {
                    const li = document.createElement("li");
                    li.innerText = `${p.name} - $${p.price}`;
                    ul.appendChild(li);
                });
            });
    </script>
</body>
</html>
