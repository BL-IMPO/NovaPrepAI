events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream django_backend {
        server django:8000;
    }

    upstream fastapi_backend {
        server fastapi:8001;
    }

    # ==========================================
    # БЛОК 1: Редирект с HTTP (80) на HTTPS (443)
    # ==========================================
    server {
        listen 80;
        server_name novaprepai.com www.novaprepai.com;

        # Перенаправляем все запросы на защищенное соединение
        return 301 https://$host$request_uri;
    }

    # ==========================================
    # БЛОК 2: Основной сервер на HTTPS
    # ==========================================
    server {
        listen 443 ssl;
        server_name novaprepai.com www.novaprepai.com;

        # Пути к SSL-сертификатам, которые мы пробросили из Ubuntu
        ssl_certificate /etc/letsencrypt/live/novaprepai.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/novaprepai.com/privkey.pem;

        # Современные настройки безопасности SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html login.html tests.html;
            try_files $uri $uri.html $uri/ /index.html;

            location ~ \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # ==========================================
        # SEO: Robots.txt & Sitemap
        # ==========================================
        location = /robots.txt {
            root /usr/share/nginx/html;
            access_log off;
            log_not_found off;
        }

        location = /sitemap.xml {
            root /usr/share/nginx/html;
            access_log off;
            log_not_found off;
        }

        # Testing pages - served by FastAPI
        location /testing/ {
            proxy_pass http://fastapi_backend/testing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /test-info/ {
            proxy_pass http://fastapi_backend/test-info/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /results/ {
            proxy_pass http://fastapi_backend/results/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Блокируем доступ к метрикам снаружи (как мы настраивали)
        location = /fastapi/metrics {
            deny all;
            return 404;
        }

        # FastAPI API endpoints
        location ~ ^/fastapi/(.*)$ {
            proxy_pass http://fastapi_backend/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
        }

        # Django API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
        }

        location /nova-control-center/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /django-static/ {
            alias /usr/share/nginx/django-static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /usr/share/nginx/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /health/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location /fastapi/health {
            proxy_pass http://fastapi_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}