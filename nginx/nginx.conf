events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream django_backend {
        server django:8000;
    }

    upstream fastapi_backend {
        server fastapi:8001;
    }

    # ==========================================
    # БЛОК ДЛЯ ЛОКАЛЬНОЙ РАЗРАБОТКИ (ТОЛЬКО HTTP)
    # ==========================================
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            index index.html login.html tests.html;
            try_files $uri $uri.html $uri/ /index.html;

            location ~ \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        location = /robots.txt {
            root /usr/share/nginx/html;
            access_log off;
            log_not_found off;
        }

        location = /sitemap.xml {
            root /usr/share/nginx/html;
            access_log off;
            log_not_found off;
        }

        # Testing pages - served by FastAPI
        location /testing/ {
            proxy_pass http://fastapi_backend/testing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /test-info/ {
            proxy_pass http://fastapi_backend/test-info/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /results/ {
            proxy_pass http://fastapi_backend/results/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /fastapi/metrics {
            deny all;
            return 404;
        }

        # FastAPI API endpoints
        location ~ ^/fastapi/(.*)$ {
            proxy_pass http://fastapi_backend/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Django API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /django-static/ {
            alias /usr/share/nginx/django-static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /usr/share/nginx/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /health/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location /fastapi/health {
            proxy_pass http://fastapi_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}