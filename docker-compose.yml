version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: diploma_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diploma_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    ports:
      - "8000:8000"
    build:
      context: ./backend_core
      dockerfile: Dockerfile
    container_name: diploma_django
    restart: unless-stopped
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      while ! nc -z postgres 5432; do
        sleep 1;
      done;
      echo 'Database ready!' &&
      echo 'Waiting for Redis...' &&
      while ! nc -z redis 6379; do
        sleep 1;
      done;
      echo 'Redis ready!' &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput -i node_modules &&
      python manage.py createsuperuser --noinput || true &&
      gunicorn backend_core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
      "
    volumes:
      - ./backend_core/src:/app
      - django_static:/app/staticfiles
      - ./media:/app/media
      - ./frontend:/app/frontend:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: 25072004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  fastapi:
    build:
      context: .
      dockerfile: backend_fastapi/Dockerfile
    container_name: diploma_fastapi
    restart: unless-stopped
    command: >
      sh -c "echo 'Waiting for dependencies...' &&
      while ! nc -z postgres 5432; do sleep 1; done;
      while ! nc -z redis 6379; do sleep 1; done;
      while ! nc -z django 8000; do sleep 1; done;
      echo 'All dependencies ready!' &&
      uvicorn src.app:app --host 0.0.0.0 --port 8001 --workers 4 --reload"
    volumes:
      - ./backend_fastapi/src:/app/src
      - ./backend_core/src:/app/backend_core/src:ro
      - ./frontend:/usr/share/nginx/html:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DJANGO_SETTINGS_MODULE: backend_core.settings
      PYTHONPATH: /app/src:/app/backend_core/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend-builder:
    image: node:20-alpine
    container_name: diploma_frontend_builder
    restart: unless-stopped
    working_dir: /app
    tty: true
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npx tailwindcss -i ./assets/css/input.css -o ./assets/css/output.css --watch"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: diploma_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - django_static:/usr/share/nginx/django-static:ro
      - ./media:/usr/share/nginx/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - django
      - fastapi
      - frontend-builder
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: diploma_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: diploma_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=SuperStrongPassword2026!
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  django_static:
  prometheus_data:
  grafana_data:
