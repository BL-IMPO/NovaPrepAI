version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: diploma_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  django:
    build:
      context: ./backend_core
    container_name: diploma_django
    command: >
      sh -c "
      until nc -z postgres 5432; do
        echo 'Waiting for postgres...';
        sleep 1;
      done;
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - ./backend_core/src:/app
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  fastapi:
    build: ./backend_fastapi
    container_name: diploma_fastapi
    command: >
      sh -c "
      until nc -z postgres 5432; do
        echo 'Waiting for postgres...';
        sleep 1;
      done;
      uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload
      "

    volumes:
      - ./backend_fastapi:/app
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8001:8001"

  nginx:
    image: nginx:latest
    container_name: diploma_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django
      - fastapi


volumes:
  postgres_data:





