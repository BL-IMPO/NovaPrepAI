version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: diploma_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diploma_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    ports:
      - "8000:8000"
    build:
      context: ./backend_core
      dockerfile: Dockerfile
    container_name: diploma_django
    restart: unless-stopped
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      while ! nc -z postgres 5432; do
        sleep 1;
      done;
      echo 'Database ready!' &&
      echo 'Waiting for Redis...' &&
      while ! nc -z redis 6379; do
        sleep 1;
      done;
      echo 'Redis ready!' &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py createsuperuser --noinput || true &&
      gunicorn backend_core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
      "
    volumes:
      - ./backend_core/src:/app
      - django_static:/app/staticfiles
      - ./media:/app/media
      - ./frontend:/app/frontend:ro  # Read-only mount for frontend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      ALLOWED_HOSTS: "localhost,127.0.0.1,django"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  fastapi:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: diploma_fastapi
    restart: unless-stopped
    command: >
      sh -c "
      echo 'Waiting for dependencies...' &&
      while ! nc -z postgres 5432; do sleep 1; done;
      while ! nc -z redis 6379; do sleep 1; done;
      while ! nc -z django 8000; do sleep 1; done;
      uvicorn src.main:app --host 0.0.0.0 --port 8001 --workers 4 --reload
      "
    volumes:
      - ./backend_fastapi:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - django
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: diploma_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - django_static:/usr/share/nginx/django-static:ro
      - ./media:/usr/share/nginx/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - django
      - fastapi
    networks:
      - app-network



networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  django_static:
